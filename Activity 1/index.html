<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sort And Reverse Numbers</title>
</head>
<body>
    <h1>Ascending and Descending Order</h1>
    <p> Click the buttons to see the ascending and descending order</p>
    <button onclick="ascending()">Ascending Order</button>
    <button onclick="descending()">Descending Order</button>
    <p id="result"></p>
    <script>
        var points = [1243, 5527, 1125, 3795, 2345];
        document.getElementById("result").innerHTML = points;
        function ascending() {
        points.sort(function(a, b){return a-b});
        document.getElementById("result").innerHTML = points;
        }
        function descending() {
        points.sort(function(a, b){return b-a});
        document.getElementById("result").innerHTML = points;
        }
    </script>
</body>
</html>
